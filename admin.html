<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin | RentCar Express</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
  <div class="app-layout">
    <aside id="appSidebar" class="sidebar-panel"></aside>
    <main class="app-main">
      <header class="page-header">
        <h1>Panel administrativo</h1>
        <p>Monitorea usuarios, reservas y solicitudes de contacto.</p>
      </header>

      <section class="stats-box" id="adminStats"></section>

      <section class="glass-box wide-box">
        <h3>Crear usuario con rol</h3>
        <form id="adminCreateUserForm" class="stack-md">
          <label class="input-group no-icon"><input type="text" id="adminUserName" placeholder="Nombre completo" required></label>
          <label class="input-group no-icon"><input type="email" id="adminUserEmail" placeholder="Correo" required></label>
          <label class="input-group no-icon"><input type="text" id="adminUserPhone" placeholder="Teléfono" required></label>
          <label class="input-group no-icon"><input type="password" id="adminUserPassword" placeholder="Contraseña temporal" minlength="8" required></label>
          <label class="input-group no-icon">
            <select id="adminUserRole" required>
              <option value="customer">Cliente</option>
              <option value="agent">Empleado</option>
              <option value="admin">Administrador</option>
            </select>
          </label>
          <button class="btn-primary" type="submit">Crear usuario</button>
          <p class="muted hidden" id="adminCreateUserMessage"></p>
        </form>
      </section>

      <section class="glass-box wide-box">
        <h3>Agregar vehículo</h3>
        <form id="adminCreateCarForm" class="stack-md">
          <label class="input-group no-icon"><input type="text" id="adminCarName" placeholder="Nombre visible (ej. Toyota Corolla)" required></label>
          <label class="input-group no-icon"><input type="text" id="adminCarBrand" placeholder="Marca" required></label>
          <label class="input-group no-icon"><input type="text" id="adminCarModel" placeholder="Modelo" required></label>
          <label class="input-group no-icon"><input type="number" id="adminCarYear" placeholder="Año" min="2000" max="2100" required></label>
          <label class="input-group no-icon">
            <select id="adminCarCategory" required>
              <option value="economico">Económico</option>
              <option value="suv">SUV</option>
              <option value="deportivo">Deportivo</option>
              <option value="lujo">Lujo</option>
            </select>
          </label>
          <label class="input-group no-icon"><input type="text" id="adminCarLocation" placeholder="Ubicación" required></label>
          <label class="input-group no-icon"><input type="number" id="adminCarPricePerDay" placeholder="Precio por día (USD)" min="1" required></label>
          <label class="input-group no-icon"><input type="url" id="adminCarImage" placeholder="URL de imagen" required></label>
          <button class="btn-primary" type="submit">Agregar vehículo</button>
          <p class="muted hidden" id="adminCreateCarMessage"></p>
        </form>
      </section>

      <section class="glass-box table-wrap wide-box">
        <h3>Usuarios</h3>
        <div class="table-toolbar">
          <label class="input-group no-icon compact-filter">
            <input type="search" id="adminUserSearch" placeholder="Buscar por nombre o correo">
          </label>
        </div>
        <table>
          <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th></tr></thead>
          <tbody id="usersTable"></tbody>
        </table>
      </section>

      <section class="glass-box table-wrap wide-box">
        <h3>Reservas</h3>
        <div class="table-toolbar">
          <label class="input-group no-icon compact-filter">
            <input type="search" id="adminBookingSearch" placeholder="Buscar por cliente o vehículo">
          </label>
        </div>
        <table>
          <thead><tr><th>ID</th><th>Cliente</th><th>Vehículo</th><th>Fechas</th><th>Tarjeta</th><th>Total</th></tr></thead>
          <tbody id="bookingsTable"></tbody>
        </table>
      </section>

      <section class="glass-box table-wrap wide-box">
        <h3>Vehículos</h3>
        <div class="table-toolbar">
          <label class="input-group no-icon compact-filter">
            <input type="search" id="adminCarSearch" placeholder="Buscar por nombre, marca, modelo o ubicación">
          </label>
        </div>
        <table>
          <thead><tr><th>ID</th><th>Vehículo</th><th>Categoría</th><th>Ubicación</th><th>Precio/día</th></tr></thead>
          <tbody id="carsTable"></tbody>
        </table>
      </section>

      <section class="glass-box table-wrap wide-box">
        <h3>Consultas</h3>
        <div class="table-toolbar">
          <label class="input-group no-icon compact-filter">
            <input type="search" id="adminInquirySearch" placeholder="Buscar por nombre, correo o mensaje">
          </label>
        </div>
        <table>
          <thead><tr><th>Nombre</th><th>Email</th><th>Mensaje</th><th>Destino</th><th>Estado correo</th></tr></thead>
          <tbody id="inquiriesTable"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
