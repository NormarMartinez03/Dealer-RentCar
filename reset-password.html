<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar | Nueva contraseña</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="auth-page forgot-page" data-page="reset-password">
  <main class="forgot-layout" id="resetBox">
    <section class="forgot-info glass-box left">
      <p class="pill">Restablecer acceso</p>
      <h1>Crea una contraseña nueva</h1>
      <p class="muted">Elige una contraseña segura de al menos 8 caracteres para proteger tu cuenta.</p>
    </section>

    <section class="glass-box forgot-form-box">
      <span class="material-symbols-outlined forgot-icon">key</span>
      <h2>Actualizar contraseña</h2>
      <form id="resetPasswordForm" class="stack-md">
        <label class="input-group">
          <span class="material-symbols-outlined">lock</span>
          <input type="password" id="newPassword" placeholder="Nueva contraseña" minlength="8" required>
        </label>
        <label class="input-group">
          <span class="material-symbols-outlined">lock</span>
          <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" minlength="8" required>
        </label>
        <button type="submit" class="btn-primary">Guardar contraseña</button>
      </form>
      <p class="footer-text"><a href="index.html">Volver al login</a></p>
    </section>
  </main>

  <main class="glass-box hidden" id="resetSuccessBox">
    <span class="material-symbols-outlined success-icon">check_circle</span>
    <h2>¡Contraseña actualizada!</h2>
    <p class="muted">Ya puedes iniciar sesión con tu nueva contraseña.</p>
    <a href="index.html" class="btn-primary">Ir al login</a>
  </main>
  <script src="app.js"></script>
</body>
</html>
