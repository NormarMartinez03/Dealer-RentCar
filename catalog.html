<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar Express | Catálogo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="catalog">
  <nav class="navbar">
    <div class="nav-logo"><h2>RentCar<span>Express</span></h2></div>
    <ul class="nav-links">
      <li><a href="catalog.html" class="active">Catálogo</a></li>
      <li><a href="contact.html">Contacto</a></li>
    </ul>
    <div class="nav-user"><span id="navUserName"></span><div id="navAuthLinks"></div></div>
  </nav>

  <header class="page-header">
    <h1>Catálogo completo de vehículos</h1>
    <p>Filtra por categoría, ciudad y precio por día.</p>
  </header>

  <section class="filters">
    <select id="filterCategory">
      <option value="todos">Todas las categorías</option>
      <option value="economico">Económico</option>
      <option value="suv">SUV</option>
      <option value="lujo">Lujo</option>
      <option value="deportivo">Deportivo</option>
    </select>
    <select id="filterLocation">
      <option value="todos">Todas las ciudades</option>
      <option value="Santo Domingo">Santo Domingo</option>
      <option value="Santiago">Santiago</option>
      <option value="Bani">Bani</option>
      <option value="Punta Cana">Punta Cana</option>
    </select>
    <select id="filterPrice">
      <option value="9999">Cualquier precio</option>
      <option value="50">Hasta $50 / día</option>
      <option value="90">Hasta $90 / día</option>
      <option value="150">Hasta $150 / día</option>
      <option value="300">Hasta $300 / día</option>
    </select>
  </section>

  <section class="car-grid" id="vehicleGrid"></section>
  <script src="app.js"></script>
</body>
</html>
