<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Empleados | RentCar Express</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="agent">
  <nav class="navbar">
    <div class="nav-logo"><h2>RentCar<span>Express</span></h2></div>
    <ul class="nav-links">
      <li><a href="agent.html" class="active">Empleados</a></li>
      <li><a href="catalog.html">Catálogo</a></li>
      <li><a href="contact.html">Contacto</a></li>
    </ul>
    <div class="nav-user"><span id="navUserName"></span><div id="navAuthLinks"></div></div>

  <header class="page-header">

    <p>Control diario de vehículos programados, en curso y finalizados.</p>

    <table>
      <thead>

          <th>Reserva</th>
          <th>Cliente</th>

          <th>Fin</th>
          <th>Estado</th>

      <tbody id="agentBookingsTable"></tbody>

  <script src="app.js"></script>
