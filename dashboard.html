<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar Express | Catálogo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard">
  <div class="app-layout">
    <aside id="appSidebar" class="sidebar-panel"></aside>
    <main class="app-main">
      <header class="page-header">
        <h1>Renta de carros fácil, rápida y segura</h1>
        <p>Explora nuestro catálogo y reserva en línea.</p>
      </header>

      <section class="stats-box" id="statsBox"></section>

      <section class="filters">
        <select id="filterCategory">
          <option value="todos">Todas las categorías</option>
          <option value="economico">Económico</option>
          <option value="suv">SUV</option>
          <option value="lujo">Lujo</option>
          <oPTION VALUE="deportivo">Deportivo</OPTION>
        </select>

        <select id="filterLocation">
          <option value="todos">Todas las ciudades</option>
          <option value="Santo Domingo">Santo Domingo</option>
          <option value="Santiago">Santiago</option>
          <option value="Bani">Bani</option>
          <option value="Punta Cana">Punta Cana</option>
          <option value="La Romana">La Romana</option>
        </select>

        <select id="filterPrice">
          <option value="9999">Cualquier precio</option>
          <option value="50">Hasta $50 / día</option>
          <option value="90">Hasta $90 / día</option>
          <option value="150">Hasta $150 / día</option>
          <option value="200">Hasta $200 / día</option>
        </select>
      </section>

      <section class="car-grid" id="vehicleGrid"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
