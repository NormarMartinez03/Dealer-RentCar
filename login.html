<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RentCar - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <span class="material-symbols-outlined" style="font-size: 50px; color: var(--primary);">lock</span>
            <h1 style="margin: 20px 0;">Entrar</h1>
            <form id="loginForm">
                <div class="input-group">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>
                <div class="input-group">
                    <span class="material-symbols-outlined">key</span>
                    <input type="password" id="pass" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
            <p style="margin-top:20px; font-size: 0.9rem;">¿No tienes cuenta? <a href="register.html" style="color:var(--primary)">Regístrate</a></p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            localStorage.setItem('currentUser', JSON.stringify({name: "Admin", email: email}));
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
