<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar Express | Iniciar sesion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" data-page="login">
  <main class="glass-box">
    <h1>Bienvenido a <span>RentCar Express</span></h1>
    <p class="muted">Inicia sesion para reservar, operar o administrar la flota.</p>
    <form id="loginForm" class="stack-md">
      <label class="input-group no-icon">
        <input type="email" id="email" placeholder="Correo electronico" required>
      </label>
      <label class="input-group no-icon">
        <input type="password" id="pass" placeholder="Contrasena" required>
      </label>
      <button type="submit" class="btn-primary">Ingresar</button>
    </form>
    <p class="footer-text"><a href="forgot-password.html">Olvide mi contrasena</a></p>
    <p class="footer-text">No tienes cuenta? <a href="register.html">Registrate</a></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
