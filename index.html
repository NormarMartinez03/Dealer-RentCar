<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RentCar - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="auth-page">
    <div class="glass-box">
        <span class="material-symbols-outlined" style="font-size: 50px; color: var(--primary);">lock</span>
        <h1 style="margin: 20px 0;">Bienvenido</h1>
        <form id="loginForm">
            <div class="input-group">
                <span class="material-symbols-outlined">mail</span>
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-group">
                <span class="material-symbols-outlined">key</span>
                <input type="password" id="pass" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn-primary">Ingresar</button>
        </form>
        <p class="footer-text"><a href="forgot-password.html">¿Olvidaste tu contraseña?</a></p>
        <p class="footer-text">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('currentUser', JSON.stringify({name: "Usuario", email: "user@mail.com"}));
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
