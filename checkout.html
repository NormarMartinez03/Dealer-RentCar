<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar Express | Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="checkout">
  <div class="app-layout">
    <aside id="appSidebar" class="sidebar-panel"></aside>
    <main class="app-main auth-page checkout-page">
      <div id="checkoutWrapper" class="glass-box checkout-box">
        <div id="paymentBox">
          <h2>Confirmar reserva</h2>
          <p class="muted" id="checkoutCar"></p>
          <p>Tarifa por dia: <strong id="checkoutPrice"></strong></p>
          <form id="checkoutForm" class="stack-md">
            <label class="input-group no-icon">
              <input type="date" id="startDate" required>
            </label>
            <label class="input-group no-icon">
              <input type="date" id="endDate" required>
            </label>
            <label class="input-group no-icon">
              <input type="text" id="cardIdentifier" placeholder="Ultimos 4 digitos de pago" maxlength="4" pattern="[0-9]{4}" required>
            </label>
            <label class="input-group no-icon">
              <input type="email" id="billingEmail" placeholder="Correo para factura" required>
            </label>
            <div class="invoice-breakdown">
              <p>Dias: <strong id="summaryDays">-</strong></p>
              <p>Subtotal: <strong id="summarySubtotal">-</strong></p>
              <p>Servicio: <strong id="summaryService">-</strong></p>
              <p>Impuestos: <strong id="summaryTaxes">-</strong></p>
              <p>Total: <strong id="totalPrice">-</strong></p>
            </div>
            <button class="btn-primary" type="submit">Pagar y reservar</button>
            <p id="checkoutMessage" class="muted hidden"></p>
          </form>
        </div>

        <div class="hidden" id="successPaymentBox">
          <h2>Reserva confirmada</h2>
          <p class="muted" id="successPaymentMessage">Tu pago fue procesado correctamente.</p>
          <a href="customer.html" class="btn-primary">Ver mis reservas</a>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
