<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar | Registro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="auth-page" data-page="register">
  <main class="glass-box">
    <h1>Crear cuenta</h1>
    <p class="muted">Regístrate y empieza a reservar en minutos.</p>
    <form id="registerForm" class="stack-md">
      <label class="input-group">
        <span class="material-symbols-outlined">person</span>
        <input type="text" id="registerName" placeholder="Nombre completo" required>
      </label>
      <label class="input-group">
        <span class="material-symbols-outlined">mail</span>
        <input type="email" id="registerEmail" placeholder="Correo electrónico" required>
      </label>
      <label class="input-group">
        <span class="material-symbols-outlined">call</span>
        <input type="tel" id="registerPhone" placeholder="Teléfono" required>
      </label>
      <label class="input-group">
        <span class="material-symbols-outlined">key</span>
        <input type="password" id="registerPassword" minlength="6" placeholder="Contraseña" required>
      </label>
      <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>
    <p class="footer-text">¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
