<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RentCar - Registro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="auth-page">
    <div class="glass-box">
        <h1>Crea tu Cuenta</h1>
        <br>
        <form action="index.html">
            <div class="input-group"><span class="material-symbols-outlined">person</span><input type="text" placeholder="Nombre completo" required></div>
            <div class="input-group"><span class="material-symbols-outlined">mail</span><input type="email" placeholder="Correo electrónico" required></div>
            <div class="input-group"><span class="material-symbols-outlined">key</span><input type="password" placeholder="Contraseña" required></div>
            <button type="submit" class="btn-primary">Registrarme</button>
        </form>
        <p class="footer-text">¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
    </div>
</body>
</html>
