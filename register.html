<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar Express | Registro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" data-page="register">
  <main class="glass-box">
    <h1>Crear cuenta</h1>
    <p class="muted">Registrate como cliente para empezar a reservar.</p>
    <form id="registerForm" class="stack-md">
      <label class="input-group no-icon">
        <input type="text" id="registerName" placeholder="Nombre completo" required>
      </label>
      <label class="input-group no-icon">
        <input type="email" id="registerEmail" placeholder="Correo electronico" required>
      </label>
      <label class="input-group no-icon">
        <input type="text" id="registerPhone" placeholder="Telefono">
      </label>
      <label class="input-group no-icon">
        <input type="password" id="registerPassword" minlength="8" placeholder="Contrasena (minimo 8 caracteres)" required>
      </label>
      <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>
    <p class="footer-text">Ya tienes cuenta? <a href="index.html">Inicia sesion</a></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
